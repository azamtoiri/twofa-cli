name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release Notes
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build & Upload (${{ matrix.target }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: twofa-cli
            asset_name: twofa-cli-linux-amd64.tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: twofa-cli
            asset_name: twofa-cli-macos-x86_64.tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: twofa-cli
            asset_name: twofa-cli-macos-arm64.tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: twofa-cli.exe
            asset_name: twofa-cli-windows-amd64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          [ -f README.md ] && cp README.md staging/ || true
          [ -f LICENSE ] && cp LICENSE staging/ || true
          cd staging
          tar -czf ../${{ matrix.asset_name }} *

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} staging/
          [ -f README.md ] && cp README.md staging/ || true
          [ -f LICENSE ] && cp LICENSE staging/ || true
          cd staging
          7z a ../${{ matrix.asset_name }} *

      - name: Upload Binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
